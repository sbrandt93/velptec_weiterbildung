<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Übung 12.3.Ü.01</title>
</head>
<body>
    <h1>Übung 12.3.Ü.01</h1>
    <h2>Aufgabe: Formulare</h2>
    <!-- Formular für Veranstaltungstermin -->
    <form id="eventForm">
        <label for="eventTitle">Veranstaltungsname:</label>
        <input type="text" id="eventTitle" name="eventTitle" required>
        <div id="eventTitleError" class="error-message"></div>
        <br>
        <label for="eventDate">Veranstaltungsdatum:</label>
        <input type="date" id="eventDate" name="eventDate" required>
        <div id="eventDateError" class="error-message"></div>
        <br>
        <label for="eventTime">Veranstaltungszeit:</label>
        <input type="time" id="eventTime" name="eventTime" required>
        <div id="eventTimeError" class="error-message"></div>
        <br>
        <label for="eventDuration">Veranstaltungsdauer (Stunden):</label>
        <input type="number" id="eventDuration" name="eventDuration" required>
        <div id="eventDurationError" class="error-message"></div>
        <br>
        <button type="button" id="submitEventButton">Termin absenden</button>
</body>
</html>
