<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Übung 12.3.C.01</title>
</head>
<body>
    <h1>Übung 12.3.C.01</h1>
    <h2>Aufgabe: Formulare</h2>
    <!-- Formular für Konferenzanmeldung -->
    <form id="registrationForm">
        <label for="firstName">Vorname:</label>
        <input type="text" id="firstName" name="firstName" required>
        <div id="firstNameError" class="error-message"></div>
        <br>
        <label for="lastName">Nachname:</label>
        <input type="text" id="lastName" name="lastName" required>
        <div id="lastNameError" class="error-message"></div>
        <br>
        <label for="email">E-Mail-Adresse:</label>
        <input type="email" id="email" name="email" required>
        <div id="emailError" class="error-message"></div>
        <br>
        <fieldset>
            <legend>Teilnahmetyp</legend>
            <input type="radio" id="speaker" name="participationType" value="speaker" required>
            <label for="speaker">Vortragender</label><br>
            <input type="radio" id="listener" name="participationType" value="listener">
            <label for="listener">Zuhörer</label><br>
        </fieldset>
        <div id="participationTypeError" class="error-message"></div>
        <br>
        <label>Workshops (maximal 3 auswählen):</label><br>
        <input type="checkbox" id="workshop1" name="workshops" value="workshop1">
        <label for="workshop1">Workshop 1</label><br>
        <input type="checkbox" id="workshop2" name="workshops" value="workshop2">
        <label for="workshop2">Workshop 2</label><br>
        <input type="checkbox" id="workshop3" name="workshops" value="workshop3">
        <label for="workshop3">Workshop 3</label><br>
        <input type="checkbox" id="workshop4" name="workshops" value="workshop4">
        <label for="workshop4">Workshop 4</label><br>
        <input type="checkbox" id="workshop5" name="workshops" value="workshop5">
        <label for="workshop5">Workshop 5</label><br>
        <div id="workshopsError" class="error-message"></div>
        <br>
        <label for="dietaryNeeds">Spezielle Ernährungsbedürfnisse:</label><br>
        <textarea id="dietaryNeeds" name="dietaryNeeds" rows="4" cols="50"></textarea>
        <div id="dietaryNeedsError" class="error-message"></div>
        <br>
        <input type="checkbox" id="dataConsent" name="dataConsent" required>
        <label for="dataConsent">Ich stimme der Verarbeitung meiner persönlichen Daten zu.</label><br>
        <div id="dataConsentError" class="error-message"></div>
        <br>
        <button type="button" id="submitRegistrationButton">Anmeldung absenden</button>
    </form>
</body>
</html>
